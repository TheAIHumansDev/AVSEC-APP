<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma Aero AI: AVSEC, WCH, RAMP & COUNTERS.</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Helvetica Neue', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }

        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        .login-container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 60px 50px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 150px rgba(218,165,32,0.15), inset 0 0 100px rgba(255,255,255,0.03);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .login-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(218,165,32,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes shimmer {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .glow {
            position: absolute;
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(218,165,32,0.15) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            animation: pulse 4s ease-in-out infinite;
        }
        .glow-1 { top: -150px; left: -150px; }
        .glow-2 { bottom: -150px; right: -150px; animation-delay: 2s; }

        .premium-badge {
            position: absolute;
            top: 20px; right: 20px;
            background: linear-gradient(135deg, rgba(218,165,32,0.3) 0%, rgba(184,134,11,0.3) 100%);
            border: 1px solid rgba(218,165,32,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            color: #DAA520;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 700;
            z-index: 1;
        }

        .logo {
            text-align: center;
            margin-bottom: 45px;
            position: relative;
            z-index: 1;
        }

        .logo-icon {
            font-size: 64px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(218,165,32,0.4));
        }

        .logo h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #DAA520 0%, #FFD700 50%, #DAA520 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 2px;
            animation: shimmer 3s linear infinite;
        }

        .logo p {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent 0%, rgba(218,165,32,0.5) 50%, transparent 100%);
            margin: 30px 0;
        }

        .access-btn {
            display: block;
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, #DAA520 0%, #B8860B 100%);
            border: none;
            border-radius: 15px;
            color: #1a1a2e;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 3px;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(218,165,32,0.4);
            text-decoration: none;
            text-align: center;
            z-index: 1;
        }

        .access-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s;
        }

        .access-btn:hover::before { left: 100%; }

        .access-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(218,165,32,0.6);
        }

        .access-btn:active { transform: translateY(-1px); }

        .footer {
            margin-top: 40px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            letter-spacing: 1px;
            position: relative;
            z-index: 1;
        }

        .footer-icons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            font-size: 20px;
        }

        .footer-icon {
            opacity: 0.6;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .footer-icon:hover {
            opacity: 1;
            transform: translateY(-3px);
            filter: drop-shadow(0 5px 15px rgba(218,165,32,0.5));
        }
    </style>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NHE2B8CJ0L"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-NHE2B8CJ0L');
    </script>
</head>
<body>

    <div id="canvas-container"></div>

    <div class="login-container">
        <div class="login-box">
            <div class="glow glow-1"></div>
            <div class="glow glow-2"></div>

            <div class="premium-badge">✦ Airline Access</div>

            <div class="logo">
                <div class="logo-icon">✈️</div>
                <h1>AERO AI</h1>
                <p>Plataforma IA</p>
            </div>

            <div class="divider"></div>

            <a href="index.html#lead" class="access-btn">Solicitar Acceso</a>

            <div class="footer">
                <p>POWERED BY AERO AI TECHNOLOGIES</p>
                <div class="footer-icons">
                    <span class="footer-icon">♿</span>
                    <span class="footer-icon">✈️</span>
                    <span class="footer-icon">🌐</span>
                    <span class="footer-icon">🛡️</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 2000;
        const posArray = new Float32Array(particlesCount * 3);
        const colorArray = new Float32Array(particlesCount * 3);

        for (let i = 0; i < particlesCount * 3; i += 3) {
            posArray[i]     = (Math.random() - 0.5) * 100;
            posArray[i + 1] = (Math.random() - 0.5) * 100;
            posArray[i + 2] = (Math.random() - 0.5) * 100;
            colorArray[i]     = 0.85 + Math.random() * 0.15;
            colorArray[i + 1] = 0.65 + Math.random() * 0.2;
            colorArray[i + 2] = 0.13 + Math.random() * 0.1;
        }

        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        const planeGeometry = new THREE.CylinderGeometry(0.3, 0.3, 3, 6);
        const planeMaterial = new THREE.MeshBasicMaterial({ color: 0xDAA520, wireframe: true, transparent: true, opacity: 0.3 });

        const plane1 = new THREE.Mesh(planeGeometry, planeMaterial);
        plane1.position.set(-20, 10, -30);
        plane1.rotation.z = Math.PI / 2;
        scene.add(plane1);

        const plane2 = new THREE.Mesh(planeGeometry, planeMaterial);
        plane2.position.set(25, -8, -40);
        plane2.rotation.z = Math.PI / 2;
        plane2.rotation.y = Math.PI / 4;
        scene.add(plane2);

        const ringGeometry = new THREE.TorusGeometry(12, 0.3, 16, 100);
        const ringMaterial = new THREE.MeshBasicMaterial({ color: 0xFFD700, wireframe: true, transparent: true, opacity: 0.2 });
        const ring = new THREE.Mesh(ringGeometry, ringMaterial);
        ring.position.set(15, 0, -25);
        scene.add(ring);

        const diamondGeometry = new THREE.OctahedronGeometry(8, 0);
        const diamondMaterial = new THREE.MeshBasicMaterial({ color: 0xDAA520, wireframe: true, transparent: true, opacity: 0.15 });
        const diamond = new THREE.Mesh(diamondGeometry, diamondMaterial);
        diamond.position.set(-15, 5, -30);
        scene.add(diamond);

        camera.position.z = 35;

        function animate() {
            requestAnimationFrame(animate);
            particlesMesh.rotation.y += 0.0008;
            particlesMesh.rotation.x += 0.0004;
            plane1.position.x += 0.02;
            if (plane1.position.x > 30) plane1.position.x = -30;
            plane2.position.x -= 0.015;
            if (plane2.position.x < -30) plane2.position.x = 30;
            ring.rotation.x += 0.005;
            ring.rotation.y += 0.008;
            diamond.rotation.x += 0.008;
            diamond.rotation.y += 0.012;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', function() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>

</body>
</html>
